[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (multi-component)
    e2e: End-to-end tests (full pipeline, slower)
    slow: Tests that take > 1s
    ethics: Ethics compliance tests
    security: Security-related tests
    latency: Latency / performance tests

# Minimum coverage enforced in CI via --cov-fail-under=80
